name: Pancake Sync

on:
  # ตัวขับหลักคือ cron-job.org (ยิง workflow_dispatch mode=fast ทุก 15 นาที)
  # cron ด้านล่างเป็น backup เผื่อ cron-job.org ล่ม — fast จัดการงาน hourly/daily เองผ่าน sync_state
  # (ไม่มี cron แยกสำหรับ hourly/daily แล้ว เพื่อกันทำงานซ้ำซ้อนกับ self-schedule)
  schedule:
    - cron: '2,17,32,47 * * * *'  # ~ทุก 15 นาที → fast (เลี่ยงนาที :00/:15/:30/:45 ที่ GitHub แออัด/ดีเลย์บ่อย)
  workflow_dispatch:
    inputs:
      mode:
        description: 'sync mode (fast | hourly | daily)'
        default: 'fast'

# ถ้ารอบก่อนยังไม่จบ ให้รอ (กันชนกัน)
concurrency:
  group: pancake-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Run sync
        env:
          POS_API_KEY: ${{ secrets.POS_API_KEY }}
          POS_SHOP_ID: ${{ secrets.POS_SHOP_ID }}
          PANCAKE_ACCESS_TOKEN: ${{ secrets.PANCAKE_ACCESS_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          MODE="${{ github.event.inputs.mode || 'fast' }}"
          echo "mode = $MODE"
          npm run sync -- "$MODE"
